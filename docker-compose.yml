services:

  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: loaded
      POSTGRES_USER: loaded
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loaded_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loaded_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loaded"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - loaded_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://loaded:${POSTGRES_PASSWORD:-loaded_dev}@postgres:5432/loaded
      REDIS_URL: redis://redis:6379
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_PAPER_API_KEY: ${ALPACA_PAPER_API_KEY:-}
      ALPACA_PAPER_SECRET_KEY: ${ALPACA_PAPER_SECRET_KEY:-}
      ALPACA_REAL_API_KEY: ${ALPACA_REAL_API_KEY:-}
      ALPACA_REAL_SECRET_KEY: ${ALPACA_REAL_SECRET_KEY:-}
      ALPACA_PAPER_TRADE: ${ALPACA_PAPER_TRADE:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FUNDAMENTALS_TTL_TRACKED_DAYS: ${FUNDAMENTALS_TTL_TRACKED_DAYS:-30}
      FUNDAMENTALS_TTL_ADHOC_DAYS: ${FUNDAMENTALS_TTL_ADHOC_DAYS:-7}
      EARNINGS_POLL_MINUTES: ${EARNINGS_POLL_MINUTES:-30}
      EARNINGS_AGEOUT_TRADING_DAYS: ${EARNINGS_AGEOUT_TRADING_DAYS:-2}
      EARNINGS_POLL_WINDOW: ${EARNINGS_POLL_WINDOW:-06:00-22:00}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Host port in the 9000-9999 range (override with BACKEND_PORT). Container
    # listens on 9000 (see backend/Dockerfile).
    ports:
      - "${BACKEND_PORT:-9000}:9000"
    networks:
      - loaded_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-9000}
    depends_on:
      - backend
    # Host port in the 4000-4999 range (override with FRONTEND_PORT). Container
    # listens on 4000 (see frontend/Dockerfile).
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    networks:
      - loaded_net

networks:
  loaded_net:
    driver: bridge

volumes:
  postgres_data:
